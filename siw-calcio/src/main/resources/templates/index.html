<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/base :: headerfiles('Homepage - Tornei')}"></head>

<body>

    <nav th:replace="~{fragments/base :: navbar}"></nav>

    <main
        style="display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; justify-content: center; gap: 4rem; max-width: 1200px; width: 100%; margin: 0 auto; padding: 4rem 2rem;">

        <!-- Colonna Sinistra -->
        <div style="flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 2rem;">
            <div>
                <h1
                    style="font-size: 3.5rem; font-weight: 900; text-transform: uppercase; line-height: 1.1; margin-bottom: 1.5rem; border-bottom: 5px solid var(--primary); padding-bottom: 0.5rem; display: inline-block;">
                    Sistema di<br>Gestione<br>Tornei</h1>
                <p
                    style="font-weight: bold; font-size: 1.2rem; text-transform: uppercase; padding-left: 1rem; border-left: 4px solid var(--secondary); line-height: 1.4;">
                    Seleziona un'area operativa per iniziare ad amministrare i dati e le squadre del campionato.</p>
                <span>numero totale di partite nel sistema: </span>
                <span th:text="${totalePartite}"></span>
            </div>

            <div
                style="font-weight: 900; font-size: 1.2rem; background: var(--card-bg); padding: 1.5rem; border: var(--border-w) solid var(--primary); box-shadow: var(--shadow-solid); max-width: max-content;">
                <span style="text-transform: uppercase; display: block; margin-bottom: 10px;">Partite Registrate:
                </span>
                <span th:text="${totalePartite}"
                    style="color: var(--secondary); font-size: 3rem; background: #fff; border: 3px solid var(--primary); padding: 0 15px; display: inline-block; box-shadow: 2px 2px 0px var(--primary);">0</span>
            </div>
        </div>

        <!-- Colonna Destra: Bottoni in griglia -->
        <div
            style="flex: 1; min-width: 320px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem;">
            <a th:href="@{/partite}" class="btn-gigante"
                style="min-width: 0; padding: 2rem 1.5rem; text-align: center; height: 100%;">
                <span style="font-size: 3rem; margin-bottom: 0.5rem; display: block;">📅</span>
                Calendario<br>Partite
            </a>
            <a th:href="@{/squadre}" class="btn-gigante"
                style="min-width: 0; padding: 2rem 1.5rem; text-align: center; height: 100%;">
                <span style="font-size: 3rem; margin-bottom: 0.5rem; display: block;">🛡️</span>
                Gestione<br>Squadre
            </a>
            <a href="http://localhost:5173" class="btn-gigante"
                style="min-width: 0; padding: 2rem 1.5rem; text-align: center; height: 100%;">
                <span style="font-size: 3rem; margin-bottom: 0.5rem; display: block;">🔍</span>
                Ricerca<br>Squadre
            </a>
            <a th:href="@{/tornei}" class="btn-gigante"
                style="min-width: 0; padding: 2rem 1.5rem; text-align: center; height: 100%;">
                <span style="font-size: 3rem; margin-bottom: 0.5rem; display: block;">🏆</span>
                Elenco<br>Tornei
            </a>
        </div>

    </main>

    <footer th:replace="~{fragments/base :: footer}"></footer>

</body>

</html>
