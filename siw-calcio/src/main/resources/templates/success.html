<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: headerfiles('Login Effettuato')}"></head>
<body>
    <nav th:replace="~{fragments/base :: navbar}"></nav>

    <main>
        <div class="dettaglio-container" style="text-align: center; padding: 50px 20px;">
            <div style="font-size: 5rem; margin-bottom: 20px;">✅</div>
            
            <h1 style="color: var(--text-main); margin-bottom: 10px;">Login Effettuato!</h1>
            
            <h3 style="color: var(--text-light); margin-bottom: 30px; font-weight: normal;">
                Bentornato in campo, sei pronto a giocare.
            </h3>

            <p style="color: #64748b; margin-bottom: 40px; font-size: 1.1rem;">
                Le tue credenziali sono state verificate con successo.
            </p>

            <div>
                <a th:href="@{/}" style="background-color: var(--primary); color: white; padding: 12px 25px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 1.1rem; transition: opacity 0.2s;">
                    🏠 Vai alla Home
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/base :: footer}"></footer>
</body>
</html>
