# ==================================
# = Datasource (Configurazione Database)
# ==================================
spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql=trace

# ATTENZIONE: 'create' cancella e ricrea le tabelle nel DB ad ogni avvio.
# In fase avanzata di sviluppo, cambialo in 'update' o 'none' per non perdere i dati.
spring.jpa.hibernate.ddl-auto=create

spring.datasource.driver-class-name=org.postgresql.Driver
# Sostituisci "tornei_calcio" con il nome che vuoi dare al tuo DB in pgAdmin
spring.datasource.url=jdbc:postgresql://localhost:5432/tornei_calcio
spring.datasource.username=postgres
spring.datasource.password=alpessio0
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==================================
# = Web server
# ==================================
server.port=8080

# ==================================
# = Thymeleaf configurations
# ==================================
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.encoding=UTF-8

# ==================================
# = Messages configuration (Gestione Errori e Validazione)
# ==================================
spring.messages.basename=messages/messages
spring.messages.encoding=UTF-8