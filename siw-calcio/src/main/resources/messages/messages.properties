# ===================================================================
# MESSAGGI DI ERRORE PER LA VALIDAZIONE
# ===================================================================

# --- Messaggi Globali (Fallback) ---
NotBlank=Il campo è obbligatorio.
NotNull=Il campo è obbligatorio.
Min=Il valore inserito deve essere maggiore o uguale a {1}.
Max=Il valore inserito deve essere minore o uguale a {1}.
Size=La lunghezza deve essere compresa tra {2} e {1} caratteri.
Past=La data deve essere antecedente a quella odierna.
Email=Inserire un formato email valido.

# --- Messaggi Specifici per Entità: SQUADRA ---
NotBlank.squadra.nome=Il nome della squadra è obbligatorio.
NotBlank.squadra.citta=La città è obbligatoria.
NotNull.squadra.annoDiFondazione=L'anno di fondazione è obbligatorio.
Min.squadra.annoDiFondazione=L'anno di fondazione deve essere uguale o successivo al {1}.
Max.squadra.annoDiFondazione=L'anno di fondazione non può essere nel futuro.

# --- Messaggi Specifici per Entità: TORNEO ---
NotBlank.torneo.nome=Il nome del torneo è obbligatorio.
NotNull.torneo.anno=L'anno o l'edizione del torneo è obbligatorio.

# --- Messaggi Specifici per Entità: PARTITA ---
NotNull.partita.dataOra=La data e l'ora della partita sono obbligatorie.
NotBlank.partita.luogo=Il luogo della partita è obbligatorio.
NotNull.partita.torneo=Selezionare il torneo di riferimento.
NotNull.partita.squadraCasa=Selezionare la squadra in casa.
NotNull.partita.squadraTrasferta=Selezionare la squadra in trasferta.
NotNull.partita.arbitro=Selezionare l'arbitro designato.

# --- Messaggi Specifici per Entità: COMMENTO ---
NotBlank.commento.testo=Il testo del commento è obbligatorio.
Size.commento.testo=Il commento non può superare i {1} caratteri.

# --- Messaggi Globali di Business ---
torneo.duplicate=Esiste già un torneo con questo nome per questo anno.
squadra.duplicate=Esiste già una squadra con questo nome.
partita.duplicate=Esiste già una partita con questa data, ora, squadra in casa e squadra in trasferta.
partita.futura=Non puoi cambiare il risultato di una partita futura.
